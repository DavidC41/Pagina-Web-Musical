<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIBERON - Admin Panel</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/admin.css">
    <link rel="icon" type="image/png" href="../Imagenes/favicon.png">
</head>
<body class="admin-page">
    
    <input type="checkbox" id="dyslexia-mode" class="hidden-checkbox">
    
    <header class="main-header" id="header">
        <div class="logo-container">
            <h1 class="brand-name">BIBERON</h1>
        </div>
        <label for="dyslexia-mode" class="dyslexia-btn">
            Alternar Modo Dislexia
        </label>
        <input type="checkbox" id="menu-toggle" style="display:none;">

        <div class="header-actions">
            <button class="action-menu" id="open-menu" aria-label="Abir menú">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </div>

        <nav id="side-menu" class="side-menu">
            <div class="menu-header">
                <span class="menu-tittle">MENÚ</span>
                <button class="close-menu" id="close-menu">CERRAR</button>
            </div>
            <div class="menu-content">
                <ul class="nav-links">
                    <li><a href="../index.html">INICIO</a></li>
                    <li><a href="tienda.html">VINILOS</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section id="login-section" class="admin-container" style="margin-top: 100px;">
        <a href="../index.html" class="back-link">← VOLVER AL INICIO</a>
        <div class="login-card">
            <h1 class="brand-name">ADMIN LOGIN</h1>
            <p>Introduce la clave y tu GitHub Token</p>
            
            <input type="password" id="admin-pass" placeholder="Contraseña">
            <input type="password" id="github-token" placeholder="GitHub Personal Access Token" style="margin-top: 10px;">
            
            <button class="btn-main" onclick="verificarPassword()" style="margin-top: 20px;">ENTRAR</button>
        </div>
    </section>

    <section id="form-section" class="admin-container" style="display: none; margin-top: 100px;">
        <header class="admin-header">
            <h1>GESTIÓN DE PRODUCTOS</h1>
            <p>Rellena los campos para actualizar la base de datos en tiempo real</p>
        </header>
        
        <div class="admin-form">
            <div class="input-group">
                <label>ID Único (ej: arca-kick-i)</label>
                <input type="text" id="p-id">
            </div>
            <div class="input-group">
                <label>Artista</label>
                <input type="text" id="p-artista">
            </div>
            <div class="input-group">
                <label>Título del Álbum</label>
                <input type="text" id="p-titulo">
            </div>
            <div class="input-group">
                <label>Precio</label>
                <input type="text" id="p-precio" placeholder="00,00 €">
            </div>
            <div class="input-group">
                <label>Imagen (solo el nombre con .png)</label>
                <input type="file" id="p-img-file" accept="image/*">
            </div>
            <div class="input-group">
                <label>Descripción</label>
                <textarea id="p-desc" rows="4"></textarea>
            </div>

            <button class="btn-main" id="btn-guardar-github">SUBIR VINILO A GITHUB</button>
            
            <div id="code-output" class="output-box"></div>
        </div>
    </section>

    <script src="../JavaScript/main.js"></script>
</body>
</html>
